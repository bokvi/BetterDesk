apiVersion: apps/v1
kind: Deployment
metadata:
  name: betterdesk
  labels:
    app: betterdesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: betterdesk
  template:
    metadata:
      labels:
        app: betterdesk
    spec:
      containers:
        - name: betterdesk
          image: ghcr.io/bokvi/betterdesk:latest
          ports:
            # NAT type test
            - name: nat
              containerPort: 21115
              hostPort: 21115
              protocol: TCP
            # Signal / Relay TCP
            - name: relay-tcp
              containerPort: 21116
              hostPort: 21116
              protocol: TCP
            # Signal / Relay UDP
            - name: relay-udp
              containerPort: 21116
              hostPort: 21116
              protocol: UDP
            # Relay TCP
            - name: relay2
              containerPort: 21117
              hostPort: 21117
              protocol: TCP
            # WebSocket Signal
            - name: ws-signal
              containerPort: 21118
              hostPort: 21118
              protocol: TCP
            # WebSocket Relay
            - name: ws-relay
              containerPort: 21119
              hostPort: 21119
              protocol: TCP
            # Web Console
            - name: web-console
              containerPort: 5000
              protocol: TCP
            # HTTP API
            - name: api
              containerPort: 21114
              protocol: TCP
            # Client API
            - name: client-api
              containerPort: 21121
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/rustdesk
            - name: console-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 21114
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: betterdesk-data
        - name: console-data
          persistentVolumeClaim:
            claimName: betterdesk-console-data
