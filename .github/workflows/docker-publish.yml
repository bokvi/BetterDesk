name: Build and Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'betterdesk-server/**'
      - 'web-nodejs/**'
      - 'docker/**'
      - 'Dockerfile*'
      - '.github/workflows/docker-publish.yml'
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/bokvi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: betterdesk
            dockerfile: Dockerfile
          - image: betterdesk-server
            dockerfile: Dockerfile.server
          - image: betterdesk-console
            dockerfile: Dockerfile.console

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max


  make-public:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Make all packages public
        run: |
          for pkg in betterdesk betterdesk-server betterdesk-console; do
            gh api orgs/${{ github.repository_owner }}/packages/container/$pkg \
              -X PATCH -f visibility=public || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
